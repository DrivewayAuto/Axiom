<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Axiom">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-180.png">
<link rel="icon" type="image/png" href="/static/icon-192.png">
<title>Axiom</title>
<style>
  :root{
    --bg:#05070c; --panel:#111826; --panel2:#16202f; --line:#20304a;
    --ink:#eef3fb; --dim:#8ea3c4; --me:#1f4fd6; --meink:#fff;
    --silver:#cfd6e0; --blue:#3b9dff; --red:#e23b3b; --ok:#34d399;
  }
  *{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;
    background:radial-gradient(130% 80% at 50% -5%,#0b1526 0%,#05070c 60%);
    color:var(--ink);display:flex;flex-direction:column;height:100dvh;overflow:hidden;
  }
  /* splash */
  #splash{position:fixed;inset:0;z-index:50;background:#000;display:flex;align-items:center;justify-content:center;
    transition:opacity .5s ease;}
  #splash img{width:66%;max-width:340px;height:auto;animation:sglow 1.6s ease-in-out infinite alternate;}
  @keyframes sglow{from{filter:drop-shadow(0 0 6px rgba(59,157,255,.15));}to{filter:drop-shadow(0 0 26px rgba(59,157,255,.5));}}
  #splash.hide{opacity:0;pointer-events:none;}
  /* header */
  header{display:flex;align-items:center;gap:11px;
    padding:calc(9px + env(safe-area-inset-top)) 15px 9px;
    background:linear-gradient(180deg,rgba(6,9,15,.97),rgba(6,9,15,.6));backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);}
  .logo{height:30px;width:auto;flex:none;}
  .brand{display:flex;flex-direction:column;line-height:1.02;}
  .brand .name{font-size:18px;font-weight:800;letter-spacing:4px;
    background:linear-gradient(180deg,#f4f7fb,#9fb0c8);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .brand .sub{font-size:8.5px;letter-spacing:2.4px;color:var(--blue);text-transform:uppercase;font-weight:700;}
  .state{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:11px;color:var(--dim);}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);}
  .dot.live{background:var(--red);box-shadow:0 0 8px var(--red);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  /* chat */
  #chat{flex:1;overflow-y:auto;padding:16px 14px 6px;display:flex;flex-direction:column;gap:11px;}
  .msg{max-width:87%;padding:11px 14px;border-radius:16px;line-height:1.46;font-size:15px;
    white-space:pre-wrap;word-wrap:break-word;animation:rise .18s ease-out;}
  @keyframes rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .me{background:var(--me);color:var(--meink);align-self:flex-end;border-bottom-right-radius:5px;}
  .ax{background:linear-gradient(180deg,var(--panel2),var(--panel));align-self:flex-start;
    border:1px solid var(--line);border-bottom-left-radius:5px;}
  .typing{color:var(--dim);font-style:italic;}
  /* welcome */
  .welcome{align-self:stretch;text-align:center;padding:26px 12px 6px;}
  .welcome img{width:200px;max-width:74%;height:auto;margin:0 auto 6px;
    filter:drop-shadow(0 8px 30px rgba(59,157,255,.25));}
  .welcome p{font-size:13px;color:var(--dim);max-width:300px;margin:6px auto 0;line-height:1.55;}
  /* recent */
  .recent{padding:2px 14px 0;}
  .recent .lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#647aa0;margin:2px 2px 6px;}
  .recent .row{display:flex;gap:8px;flex-wrap:wrap;}
  .rchip{font-size:12px;color:#b9cbe6;background:#0d1626;border:1px dashed #2a3a58;padding:7px 12px;border-radius:18px;
    max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rchip:active{background:#152238;}
  /* chips */
  .chips{display:flex;gap:8px;flex-wrap:wrap;padding:8px 14px 8px;}
  .chip{font-size:12.5px;font-weight:600;color:#d3e2f7;background:#101a2b;
    border:1px solid #22314d;padding:8px 13px;border-radius:20px;}
  .chip:active{background:#17263f;}
  /* controls */
  .bar{display:flex;gap:8px;align-items:center;padding:2px 12px 0;}
  .toggle{font-size:12px;font-weight:700;letter-spacing:.4px;color:#c3d6f2;background:#101a2b;
    border:1px solid #22314d;height:38px;padding:0 14px;border-radius:20px;display:flex;align-items:center;gap:6px;}
  .toggle.on{background:linear-gradient(135deg,#0e5aa0,#1f7fd6);color:#eafaff;border-color:var(--blue);}
  .mutebtn{width:38px;height:38px;border-radius:50%;border:1px solid #22314d;background:#101a2b;color:#c3d6f2;
    display:flex;align-items:center;justify-content:center;font-size:15px;}
  form{display:flex;gap:9px;align-items:center;padding:9px 12px calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(0deg,rgba(6,9,15,.97),rgba(6,9,15,.5));border-top:1px solid var(--line);}
  input#inp{flex:1;padding:13px 15px;border-radius:24px;border:1px solid #2a3a58;background:#0a1120;
    color:var(--ink);font-size:16px;outline:none;}
  input#inp:focus{border-color:var(--blue);}
  .icon{width:47px;height:47px;flex:none;border-radius:50%;border:none;display:flex;align-items:center;
    justify-content:center;font-size:19px;color:#fff;}
  .mic{background:#101a2b;border:1px solid #2a3a58;color:#d3e2f7;}
  .mic.on{background:var(--red);border-color:var(--red);color:#fff;animation:pulse 1s infinite;}
  .send{background:linear-gradient(135deg,#2f9dff,#1f5fd6);}
  .hint{font-size:11px;color:#6b7fa0;text-align:center;padding:2px 16px 0;min-height:14px;}
</style>
</head>
<body>
<div id="splash"><img src="/static/logo_full.png" alt="AXIOM"></div>

<header>
  <img class="logo" src="/static/icon-192.png" alt="">
  <div class="brand"><span class="name">AXIOM</span><span class="sub">AI Mechanic Agent</span></div>
  <div class="state"><span class="dot" id="dot"></span><span id="status">ready</span></div>
</header>

<div id="chat">
  <div class="welcome">
    <img src="/static/logo_full.png" alt="AXIOM - AI Mechanic Agent">
    <p>Your master mechanic. Tap the mic and talk, or use a shortcut below. Codes, specs, VINs, recalls &mdash; just ask.</p>
  </div>
</div>

<div class="recent" id="recentWrap" style="display:none;">
  <div class="lbl">Recent</div>
  <div class="row" id="recent"></div>
</div>

<div class="chips" id="chips">
  <button class="chip" data-q="What does P0420 mean?">🔧 Trouble code</button>
  <button class="chip" data-q="Decode this VIN: ">🔑 VIN lookup</button>
  <button class="chip" data-q="Oil capacity for a ">🛢️ Oil / fluids</button>
  <button class="chip" data-q="Any recalls on a ">⚠️ Recall check</button>
</div>

<div class="bar">
  <button class="toggle" id="hands" type="button">🎙 HANDS-FREE: OFF</button>
  <button class="mutebtn" id="mute" type="button" title="Stop talking">🔇</button>
</div>
<div class="hint" id="hint"></div>

<form id="f">
  <button class="icon mic" id="mic" type="button" title="Talk">🎤</button>
  <input id="inp" placeholder="Ask Axiom..." autocomplete="off">
  <button class="icon send" id="send" type="submit" title="Send">➤</button>
</form>

<script>
const chat=document.getElementById("chat"),f=document.getElementById("f"),inp=document.getElementById("inp"),
  micBtn=document.getElementById("mic"),handsBtn=document.getElementById("hands"),dot=document.getElementById("dot"),
  statusEl=document.getElementById("status"),muteBtn=document.getElementById("mute"),hint=document.getElementById("hint"),
  chips=document.getElementById("chips"),recentWrap=document.getElementById("recentWrap"),recentRow=document.getElementById("recent"),
  splash=document.getElementById("splash");
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let recog=null,listening=false,handsFree=false,axVoice=null,welcomeGone=false;

/* ---- splash: fade out after load ---- */
function hideSplash(){splash.classList.add("hide");setTimeout(()=>splash.remove(),600);}
window.addEventListener("load",()=>setTimeout(hideSplash,1100));
setTimeout(hideSplash,2600); // safety

if(!SR){hint.textContent="Voice input needs Safari (iPhone) or Chrome (Android). Typing works fine.";micBtn.style.opacity=.45;}

/* ---- voice: prefer British male (Jarvis) ---- */
const GB_MALE=["Daniel","Arthur","Oliver","Google UK English Male","Microsoft Ryan","Microsoft George","Microsoft Thomas"];
const US_MALE=["Aaron","Alex","Fred","Google US English","Microsoft David","Microsoft Guy","Microsoft Mark"];
const FEMALE=/(female|Samantha|Victoria|Karen|Moira|Tessa|Fiona|Susan|Zira|Hazel|Catherine|Linda|Zoe|Allison|Ava|Serena|Nicky|Kate|Google UK English Female)/i;
function pickVoice(){
  const vs=speechSynthesis.getVoices();if(!vs.length)return;
  const gb=vs.filter(v=>/en-GB/i.test(v.lang)),en=vs.filter(v=>/^en/i.test(v.lang));
  axVoice=gb.find(v=>GB_MALE.some(n=>v.name.includes(n)))
    ||gb.find(v=>/male/i.test(v.name)&&!/female/i.test(v.name))
    ||gb.find(v=>!FEMALE.test(v.name))
    ||en.find(v=>US_MALE.some(n=>v.name.includes(n)))
    ||en.find(v=>/male/i.test(v.name)&&!/female/i.test(v.name))
    ||en.find(v=>!FEMALE.test(v.name))||en[0]||vs[0];
}
if("speechSynthesis"in window){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}
function speakable(t){return t.replace(/[#*`_>]/g,"").replace(/^\s*[-\d]+[.)]\s*/gm,", ")
  .replace(/\[(system|severity)[^\]]*\]/gi,"").replace(/\s+/g," ").trim();}
function speak(t,after){
  if(!("speechSynthesis"in window)){if(after)after();return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(speakable(t));
  if(axVoice)u.voice=axVoice;u.rate=.98;u.pitch=.92;
  u.onend=()=>{if(after)after();};u.onerror=()=>{if(after)after();};
  speechSynthesis.speak(u);
}
muteBtn.onclick=()=>speechSynthesis.cancel();

/* ---- recent questions (localStorage) ---- */
function loadRecent(){try{return JSON.parse(localStorage.getItem("axiom_recent")||"[]");}catch(e){return[];}}
function saveRecent(q){
  if(!q||q.length>60)return;
  let r=loadRecent().filter(x=>x.toLowerCase()!==q.toLowerCase());
  r.unshift(q);r=r.slice(0,6);
  localStorage.setItem("axiom_recent",JSON.stringify(r));renderRecent();
}
function renderRecent(){
  const r=loadRecent();
  if(!r.length){recentWrap.style.display="none";return;}
  recentWrap.style.display="block";recentRow.innerHTML="";
  r.forEach(q=>{const b=document.createElement("button");b.className="rchip";b.textContent=q;
    b.onclick=()=>ask(q,false);recentRow.appendChild(b);});
}
renderRecent();

/* ---- ui ---- */
function clearWelcome(){if(welcomeGone)return;const w=chat.querySelector(".welcome");if(w)w.remove();welcomeGone=true;}
function add(cls,text){clearWelcome();const d=document.createElement("div");d.className="msg "+cls;d.textContent=text;
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;return d;}
function setLive(on,label){dot.classList.toggle("live",on);statusEl.textContent=label;}

/* viaVoice = true only when the question came from the mic; controls whether Axiom speaks */
async function ask(q,viaVoice){
  add("me",q);saveRecent(q);const t=add("ax typing","thinking...");setLive(false,"thinking...");
  try{
    const r=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:q})});
    const j=await r.json();t.classList.remove("typing");t.textContent=j.reply;chat.scrollTop=chat.scrollHeight;
    setLive(false,handsFree?"hands-free on":"ready");
    if(viaVoice){speak(j.reply,()=>{if(handsFree)startListen();});}   // only talk back when talked to
  }catch(e){t.classList.remove("typing");t.textContent="Connection problem - try again.";if(viaVoice&&handsFree)startListen();}
}
f.addEventListener("submit",e=>{e.preventDefault();const q=inp.value.trim();if(!q)return;inp.value="";ask(q,false);});

chips.addEventListener("click",e=>{
  const b=e.target.closest(".chip");if(!b)return;const q=b.dataset.q;
  if(q.trim().endsWith("?")){ask(q,false);}else{inp.value=q;inp.focus();}
});

/* ---- speech recognition ---- */
function newRecog(){
  const r=new SR();r.lang="en-US";r.interimResults=false;r.maxAlternatives=1;r.continuous=false;
  r.onstart=()=>{listening=true;micBtn.classList.add("on");setLive(true,"listening...");};
  r.onresult=e=>{const said=e.results[0][0].transcript.trim();if(said)ask(said,true);}; // voice -> speak back
  r.onerror=e=>{listening=false;micBtn.classList.remove("on");setLive(false,e.error==="not-allowed"?"allow mic access":"ready");};
  r.onend=()=>{listening=false;micBtn.classList.remove("on");if(!speechSynthesis.speaking)setLive(false,handsFree?"hands-free on":"ready");};
  return r;
}
function startListen(){if(!SR||listening)return;speechSynthesis.cancel();recog=newRecog();try{recog.start();}catch(e){}}
function stopListen(){if(recog&&listening){try{recog.stop();}catch(e){}}}
micBtn.onclick=()=>{if(listening)stopListen();else startListen();};
handsBtn.onclick=()=>{
  handsFree=!handsFree;handsBtn.classList.toggle("on",handsFree);
  handsBtn.textContent="🎙 HANDS-FREE: "+(handsFree?"ON":"OFF");
  if(handsFree){setLive(false,"hands-free on");startListen();}
  else{stopListen();speechSynthesis.cancel();setLive(false,"ready");}
};
if("serviceWorker"in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{});}
</script>
</body>
</html>
